@if(isLoggedIn()) {
<div class="gap-2">
    <mat-icon [routerLink]="['/user-profile', currentUser().userId ]">account_circle</mat-icon>
    <p>{{ currentUser().userName }}</p>
    <a (click)="onLogOut()">Logout</a>
</div>
} @else {
<div><a routerLink="/login">Login</a></div>
}

<app-header />

<main>
    <app-available-places />
</main>
