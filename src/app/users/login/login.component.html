<app-modal>
    <h2>Login</h2>
    <form #form="ngForm" (ngSubmit)="onSubmit(form)">
        <p>
            <label for="username">Username</label>
            <input type="text" id="username" name="username" [(ngModel)]="enteredUserName" required #username="ngModel" />
            @if (username.touched && enteredUserName() === "") {
                <p class="control-error">Invalid username entered.</p>
            }
        </p>

        <p>
            <label for="password">Password</label>
            <input type="password" id="password" name="password" [(ngModel)]="enteredPassword" required />
        </p>

        <p class="actions"><a routerLink="/register">Register</a></p>

        <p class="actions">
            <a routerLink="../">Cancel</a>
            <button type="submit">Login</button>
        </p>
    </form>
</app-modal>
